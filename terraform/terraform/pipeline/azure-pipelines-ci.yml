trigger:
  branches:
    include:
    - main
    - develop

variables:
  dockerRegistryServiceConnection: 'docker-hub-connection'
  imageRepository: '$(dockerHubUsername)/unyleya-app'
  containerRegistry: 'docker.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

stages:
- stage: Build
  displayName: 'Build and Push Docker Image'
  jobs:
  - job: Build
    displayName: 'Build'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: Docker@2
      displayName: 'Build and push image'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(dockerfilePath)'
        tags: |
          $(tag)
          latest
        buildContext: '$(Build.SourcesDirectory)'
    
    - task: CopyFiles@2
      displayName: 'Copy Terraform files to artifact'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/terraform'
        Contents: '**/*'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/terraform'
    
    - task: CopyFiles@2
      displayName: 'Copy pipeline files to artifact'
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)/pipeline'
        Contents: '**/*'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/pipeline'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish artifacts'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
